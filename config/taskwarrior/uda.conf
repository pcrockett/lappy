# "impact" UDA:
#
# * 1, 2, 3 are considered "low" impact
# * 4, 5, 6 are considered "high" impact
# * this is intentionally NOT a numeric value, but a string
#
# i use this to put tasks into categories according to the eisenhower matrix. see custom
# reports further below. "focus", "schedule", "upkeep", and "forgettable" correspond to
# the 4 quadrants in the eisenhower matrix.
uda.impact.type=string
uda.impact.label=Imp
uda.impact.values=1,2,3,4,5,6

uda.calendaruid.type=string
uda.calendaruid.label=Calendar UID

uda.calendarseq.type=string
uda.calendarseq.label=Calendar Seq

# for calendar integration, should be specified in Nushell duration format
uda.duration.type=string
uda.duration.label=Duration

uda.postpone_count.type=string
uda.postpone_count.label=Postponed

uda.link.type=string
uda.link.label=Link

uda.kb.type=string
uda.kb.label=Knowledgebase

uda.notes.type=string
uda.notes.label=Notes

# should probably always be paired with `security` tag
urgency.uda.risk.coefficient=1
uda.risk.type=numeric
